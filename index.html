<!DOCTYPE html>
<html lang="en-us">
  <head>
    <meta charset="utf-8">
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black">
    <meta name="mobile-web-app-capable" content="yes">
    <title>Bunny Bounce</title>
    <link rel="shortcut icon" href="TemplateData/favicon.ico">
    <link rel="stylesheet" href="TemplateData/style.css">
  </head>
  <body>
    <div id="unity-container" class="unity-desktop">
      <canvas id="unity-canvas" width=1280 height=720 tabindex="-1"></canvas>
      <div id="unity-loading-bar">
        <div id="unity-logo"></div>
        <div id="unity-progress-bar-empty">
          <div id="unity-progress-bar-full"></div>
        </div>
      </div>
      <div id="unity-warning"> </div>
      <div id="unity-footer">
        <div id="unity-logo-title-footer"></div>
        <div id="unity-fullscreen-button"></div>
        <div id="unity-build-title">Bunny Bounce</div>
      </div>
    </div>
    <script>
      var canvas = document.querySelector("#unity-canvas");

      function unityShowBanner(msg, type) {
        var warningBanner = document.querySelector("#unity-warning");
        function updateBannerVisibility() {
          warningBanner.style.display = warningBanner.children.length ? 'block' : 'none';
        }
        var div = document.createElement('div');
        div.innerHTML = msg;
        warningBanner.appendChild(div);
        if (type == 'error') div.style = 'background: red; padding: 10px;';
        else {
          if (type == 'warning') div.style = 'background: yellow; padding: 10px;';
          setTimeout(function() {
            warningBanner.removeChild(div);
            updateBannerVisibility();
          }, 5000);
        }
        updateBannerVisibility();
      }

      var buildVersion = "20260722-movement-variety";
      var buildUrl = "Build";
      function versionedBuildFile(fileName) {
        return buildUrl + "/" + fileName + "?v=" + buildVersion;
      }
      var loaderUrl = versionedBuildFile("Bunny Bounce Web.loader.js");
      var config = {
        arguments: [],
        dataUrl: versionedBuildFile("Bunny Bounce Web.data"),
        frameworkUrl: versionedBuildFile("Bunny Bounce Web.framework.js"),
        codeUrl: versionedBuildFile("Bunny Bounce Web.wasm"),
        streamingAssetsUrl: "StreamingAssets",
        companyName: "DefaultCompany",
        productName: "Bunny Bounce",
        productVersion: buildVersion,
        showBanner: unityShowBanner,
      };

      var isMobile = /iPhone|iPad|iPod|Android/i.test(navigator.userAgent);

      // Unity側(WebGLプラグイン経由)からシーン読み込みのたびに問い合わせられる
      window.isMobileDevice = isMobile;

      if (isMobile) {
        // Mobile device style: fill the whole browser client area with the game canvas:

        var meta = document.createElement('meta');
        meta.name = 'viewport';
        meta.content = 'width=device-width, height=device-height, initial-scale=1.0, user-scalable=no, shrink-to-fit=yes';
        document.getElementsByTagName('head')[0].appendChild(meta);
        document.querySelector("#unity-container").className = "unity-mobile";
        canvas.className = "unity-mobile";

      } else {
        // Desktop style: Render the game canvas in a window that can be maximized to fullscreen:
        canvas.style.width = "1280px";
        canvas.style.height = "720px";
      }

      document.querySelector("#unity-loading-bar").style.display = "block";

      function deleteIndexedDbDatabase(databaseName) {
        return new Promise(function(resolve) {
          if (!window.indexedDB) {
            resolve();
            return;
          }

          var settled = false;
          var timeout = setTimeout(function() {
            if (!settled) {
              settled = true;
              resolve();
            }
          }, 1500);

          var request = indexedDB.deleteDatabase(databaseName);
          request.onsuccess = request.onerror = request.onblocked = function() {
            if (!settled) {
              settled = true;
              clearTimeout(timeout);
              resolve();
            }
          };
        });
      }

      function clearUnityWebCache() {
        var cachePromise = Promise.resolve();

        if (window.caches) {
          cachePromise = caches.keys().then(function(keys) {
            return Promise.all(keys.map(function(key) {
              var lowerKey = key.toLowerCase();
              if (lowerKey.indexOf("unity") !== -1 || lowerKey.indexOf("bunny") !== -1 || lowerKey.indexOf("defaultcompany") !== -1) {
                return caches.delete(key);
              }
              return Promise.resolve();
            }));
          }).catch(function() {});
        }

        try {
          Object.keys(localStorage).forEach(function(key) {
            var lowerKey = key.toLowerCase();
            if (lowerKey.indexOf("unity") !== -1 || lowerKey.indexOf("bunny") !== -1) {
              localStorage.removeItem(key);
            }
          });
        } catch (error) {}

        return Promise.all([
          cachePromise,
          deleteIndexedDbDatabase("UnityCache")
        ]);
      }

      var script = document.createElement("script");
      script.src = loaderUrl;
      script.onload = () => {
        createUnityInstance(canvas, config, (progress) => {
          document.querySelector("#unity-progress-bar-full").style.width = 100 * progress + "%";
        }).then((unityInstance) => {
          document.querySelector("#unity-loading-bar").style.display = "none";
          document.querySelector("#unity-fullscreen-button").onclick = () => {
            unityInstance.SetFullscreen(1);
          };

        }).catch((message) => {
          alert(message);
        });
      };

      clearUnityWebCache().finally(function() {
        document.body.appendChild(script);
      });

    </script>
  </body>
</html>
